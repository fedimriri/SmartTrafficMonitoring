# SmartTrafficMonitoring — Docker Compose
# Reproduces the 6-container Big Data cluster used in development.
#
# All images are hosted on Docker Hub under the fedimriri namespace.
# No local image builds are required.
#
# Quick start (on any machine):
#   docker compose pull
#   docker compose up -d
#   bash scripts/start-spark.sh        # Start Spark Master + Workers
#
# The hadoop-cluster image handles SSH key exchange internally — no manual setup needed.
# After 'up', run the MapReduce jobs and streaming pipeline as documented in README.md.

services:

  # ─── Hadoop Master ─────────────────────────────────────────────────────────
  hadoop-master:
    image: fedimriri/hadoop-cluster:latest
    container_name: hadoop-master
    hostname: hadoop-master
    stdin_open: true
    tty: true
    networks:
      - SmartTrafficMonitoring
    ports:
      - "9870:9870"    # HDFS NameNode UI
      - "8088:8088"    # YARN ResourceManager UI
      - "7877:7877"    # Secondary NameNode RPC
      - "8888:8888"    # Jupyter / Web proxy
      - "16010:16010"  # HBase Master UI (if used)
    environment:
      - HADOOP_HOME=/usr/local/hadoop
      - YARN_HOME=/usr/local/hadoop
      - SPARK_HOME=/usr/local/spark
      - KAFKA_HOME=/usr/local/kafka
      - HADOOP_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - YARN_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - LD_LIBRARY_PATH=/usr/local/hadoop/lib/native
      - HBASE_HOME=/usr/local/hbase
      - CLASSPATH=:/usr/local/hbase/lib/*
    # Start SSH, wait for workers to initialize, then start HDFS and YARN
    command: >
      sh -c "service ssh start &&
             sleep 8 &&
             /usr/local/hadoop/sbin/start-dfs.sh &&
             /usr/local/hadoop/sbin/start-yarn.sh &&
             tail -f /dev/null"
    depends_on:
      - hadoop-worker1
      - hadoop-worker2

  # ─── Hadoop Worker 1 ───────────────────────────────────────────────────────
  hadoop-worker1:
    image: fedimriri/hadoop-cluster:latest
    container_name: hadoop-worker1
    hostname: hadoop-worker1
    stdin_open: true
    tty: true
    networks:
      - SmartTrafficMonitoring
    ports:
      - "8841:8842"    # DataNode HTTP UI
    environment:
      - HADOOP_HOME=/usr/local/hadoop
      - YARN_HOME=/usr/local/hadoop
      - HADOOP_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - YARN_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - LD_LIBRARY_PATH=/usr/local/hadoop/lib/native
    command: sh -c "service ssh start && tail -f /dev/null"

  # ─── Hadoop Worker 2 ───────────────────────────────────────────────────────
  hadoop-worker2:
    image: fedimriri/hadoop-cluster:latest
    container_name: hadoop-worker2
    hostname: hadoop-worker2
    stdin_open: true
    tty: true
    networks:
      - SmartTrafficMonitoring

    ports:
      - "8842:8842"    # DataNode HTTP UI
    environment:
      - HADOOP_HOME=/usr/local/hadoop
      - YARN_HOME=/usr/local/hadoop
      - HADOOP_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - YARN_CONF_DIR=/usr/local/hadoop/etc/hadoop
      - LD_LIBRARY_PATH=/usr/local/hadoop/lib/native
    command: sh -c "service ssh start && tail -f /dev/null"

  # ─── Spark Master ──────────────────────────────────────────────────────────
  spark-master:
    image: fedimriri/spark-image:latest
    container_name: spark-master
    hostname: spark-master
    stdin_open: true
    tty: true
    networks:
      - SmartTrafficMonitoring          # Shared with Hadoop so Spark can access HDFS/YARN
    ports:
      - "8080:8080"     # Spark Master Web UI
      - "7077:7077"     # Spark cluster submit port (spark://spark-master:7077)
      - "9999:9999"     # Socket input port for TrafficDataProducer
    # Spark daemons must be started explicitly (see scripts/start-spark.sh)
    command: sh -c "tail -f /dev/null"
    depends_on:
      - hadoop-master

  # ─── Spark Worker 1 ────────────────────────────────────────────────────────
  spark-slave1:
    image: fedimriri/spark-image:latest
    container_name: spark-slave1
    hostname: spark-slave1
    stdin_open: true
    tty: true
    networks:
      - SmartTrafficMonitoring
    command: sh -c "tail -f /dev/null"
    depends_on:
      - spark-master

  # ─── Spark Worker 2 ────────────────────────────────────────────────────────
  spark-slave2:
    image: fedimriri/spark-image:latest
    container_name: spark-slave2
    hostname: spark-slave2
    stdin_open: true
    tty: true
    networks:
      - SmartTrafficMonitoring
    command: sh -c "tail -f /dev/null"
    depends_on:
      - spark-master

networks:
  SmartTrafficMonitoring:
    name: SmartTrafficMonitoring
    driver: bridge
